name: Telani.OpenDocumentCreator Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    env:
      # Authenticates the `github-telani` source declared in NuGet.Config so
      # the build can restore the private Telani.SourceGenerator package.
      NuGetPackageSourceCredentials_github-telani: Username=${{ github.actor }};Password=${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # avoid shallow clone so nbgv can do its work.

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Display dotnet version
        run: dotnet --version

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run tests
        run: dotnet test --no-build

      - name: Build Release
        run: dotnet build -c Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nuget-Package
          if-no-files-found: error
          path: |
            ${{ github.workspace }}/src/bin/Release/*.nupkg

      - name: Push package to GitHub packages
        run: dotnet nuget push src/bin/Release/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/telani-app/index.json"
